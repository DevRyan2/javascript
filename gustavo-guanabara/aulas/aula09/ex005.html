<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiros passos com DOM</title>
    <style>

        body {
            background-color: rgb(7, 35, 66);
            color: white;

            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.3em;
            font-weight: normal;
        }

    </style>
</head>
<body>

    <h1>Iniciando estudos com DOM</h1>

    <p>Aqui vai o resultado</p>
    <p>Aprendendo a usar <strong>DOM</strong> em JavaScript</p>

    <div>Clique em mim</div>
    <div></div>
    <div id="id"></div>
    <div name="name"></div>
    <div class="class"></div>
    <div id="seletor"></div>

    <script>

        var corpo = window.document.body

        // Utilizando tagName

        var d = window.document.getElementsByTagName('div')[1]

        d.innerText = `Utilizando por getElementsByTagName( )`

        d.style.color = 'gray'

        //==========================================
        
        // Utilizando por id

        var div = window.document.getElementById('id')
        div.style.color = 'yellow'
        div.innerText = `Utilizando getElementById( )`

        // =============================================

        // Utilizando por name

        var divName = window.document.getElementsByName('name')[0]

        divName.innerText = `Utilizando por getElementsByName( )`

        //=============================================

        // Utilizando por class

        var divClass = window.document.getElementsByClassName('class')[0]

        divClass.innerText = `Utilizando getElementByClassName( )`

        divClass.style.color = 'blue'

        //===============================================

        // Utilizando seletor

        var divSeletor = window.document.querySelector('div#seletor')

        divSeletor.style.color = 'purple'

        divSeletor.innerText = `Utilizando querySelector( )`

    </script>
    
</body>
</html>
