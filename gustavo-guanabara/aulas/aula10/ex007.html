<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando Números</title>
    <style>

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-flow: column;

            background-color: darkgray;

            font-family: Arial, Helvetica, sans-serif;
            font-weight: normal;
            font-size: 1.4em;
        }

        div#soma {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-flow: row wrap;
            gap: 20px;
            
            border: 1px solid rgb(129, 129, 129);
            height: 150px;
            width: 800px;

            border-radius: 8px;
            background-color: rgb(138, 137, 137);
            box-shadow: 1px 1px 3px rgba(0, 0, 0, 0.452);
        }

        input {
            width: 70px;
            height: 45px;
            margin-right: 10px;
            margin-left: 10px;
            margin-bottom: 20px;

            font-weight: normal;
            font-size: 1.3em;
        }

        input.botao {
            width: 90px;
            height: 50px;
            border: none;

            border-radius: 8px;
            background-color: blue;
            color: white;

            font-size: .8em;
        }

    </style>
</head>
<body>

    <h1>Somando Valores</h1>

    <div id="soma">

        <input type="number" name="txtn1" id="txtn1"> +
        <input type="number" name="txtn2" id="txtn2">
        <input class="botao" type="button" value="Somar" onclick="somar()">
        <div id="res">Resultado</div>

    </div>

    <script>

        function somar() {
            var tn1 = window.document.querySelector('input#txtn1')
            var tn2 = window.document.querySelector('input#txtn2')
            var divRes = window.document.querySelector('div#res')

            n1 = Number(tn1.value)
            n2 = Number(tn2.value)

            soma = n1 + n2

            divRes.innerHTML = `A soma entre ${n1} e ${n2} é igual a <strong>${soma}</strong`

        }

    </script>

</body>
</html>
