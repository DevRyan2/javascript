<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Eventos DOM</title>
        <style>
            body {
                background-color: rgb(214, 214, 214);
            }

            div#click, div#mouseenter {
                display: inline-block;

                width: 200px;
                height: 200px;
                margin-right: 20px;

                background-color: green;
                color: white;

                font-family: Arial, Helvetica, sans-serif;
                font-size: 1.4em;
                font-weight: normal;
                line-height: 200px;
                text-align: center;

                cursor: pointer;
            }

            div#mouseenter {
                color: black;
            }
        </style>
    </head>
    <body>
        
        <div id="click">Interaja...</div>
        <div id="mouseenter">Interaja</div>

        <script>

            var divClick = window.document.querySelector('div#click')
            var divMouseEnter = window.document.querySelector('div#mouseenter')

            divClick.addEventListener('click', clicar)
            divMouseEnter.addEventListener('mouseenter', entrar)
            divMouseEnter.addEventListener('mouseout', sair)

            function clicar() {

                var divClick = window.document.querySelector('div#click')

                divClick.style.background = 'darkblue'
                divClick.innerText = 'Você clicou'
            }

            function entrar() {
                var divMouseEnter = window.document.querySelector('div#mouseenter')

                divMouseEnter.style.background = 'yellow'
                divMouseEnter.style.color = 'black'
                divMouseEnter.innerText = 'Entrou'
            }

            function sair() {
                var divMouseOut = window.document.querySelector('div#mouseenter')

                divMouseOut.innerText = 'Saiu'
                divMouseOut.style.background = 'darkred'
                divMouseOut.style.color = 'white'
            }

        </script>
    </body>
</html>
